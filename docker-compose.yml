services:
  api:
    build: .
    container_name: shirayuki-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      # Optional: route only Cloudflare-IP-gated CDNs (mewstream/lostproject,
      # owocdn) through a SOCKS5 proxy so they egress from a trusted IP. These
      # CDNs hard-block datacenter IPs AND Cloudflare WARP, so only a paid
      # RESIDENTIAL/mobile proxy actually unblocks them (yuki/uwu). Uncomment
      # and point at one to enable; no code change needed:
      # - GATED_PROXY=socks5://USER:PASS@residential-host:PORT
    restart: unless-stopped
